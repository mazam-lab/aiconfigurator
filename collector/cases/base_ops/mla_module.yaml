  mla_module_vllm:
    description: Exact vLLM full MLA/DSA module micro-benchmark sweep for the current vLLM collector.
    context_batch_sizes:
      - 1
      - 2
      - 4
      - 8
      - 16
      - 32
      - 64
      - 128
      - 256
    context_sequence_lengths:
