    module_precision_combos:
      - compute_dtype: bfloat16
        kv_cache_dtype: bfloat16
        gemm_type: bfloat16
    context:
      max_tokens: 131072
      large_sequence_min: 8192
      large_sequence_max_batch_size: 8
    generation:
      max_tokens: 262144
      large_sequence_min: 8192
      large_sequence_max_batch_size: 16
    constraints:
      - 'context: batch_size * sequence_length <= 131072'
      - 'context: sequence_length >= 8192 requires batch_size <= 8'
      - 'generation: batch_size * sequence_length <= 262144'
      - 'generation: sequence_length >= 8192 requires batch_size <= 16'
    # top_level_head_counts keep ModelRunner-loading subprocess counts manageable.
  mla_module_sglang:
