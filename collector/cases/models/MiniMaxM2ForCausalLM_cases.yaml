schema_version: 1
architecture: MiniMaxM2ForCausalLM
model_path: MiniMaxAI/MiniMax-M2.5
model_paths:
  - MiniMaxAI/MiniMax-M2
  - MiniMaxAI/MiniMax-M2.5
  - MiniMaxAI/MiniMax-M2.7
  - nvidia/MiniMax-M2.5-NVFP4
  - nvidia/MiniMax-M2.7-NVFP4
include_base: true
description: >
  MiniMax-M2 MoE model-centric collection plan.

model_case_values:
  attention:
    - id: minimax_m2_attention
      model_path: MiniMaxAI/MiniMax-M2.5
      model_aliases:
        - MiniMaxAI/MiniMax-M2
        - MiniMaxAI/MiniMax-M2.7
        - nvidia/MiniMax-M2.5-NVFP4
        - nvidia/MiniMax-M2.7-NVFP4
      num_attention_heads: 48
      num_key_value_heads: 8
      head_dim: 128
      window_size: 0
      tensor_parallel_sizes: [1, 2, 4, 8, 16]
  moe:
    - model_path: MiniMaxAI/MiniMax-M2.5
      model_aliases:
        - MiniMaxAI/MiniMax-M2
        - MiniMaxAI/MiniMax-M2.7
      hidden_size: 3072
      inter_size: 1536
      topk: 8
      num_experts: 256
      sglang_moe_scoring_func: sigmoid
      sglang_moe_renormalize: true
      sglang_moe_has_correction_bias: true
      sglang_moe_backends:
        fp8_block: {default: triton}
      wideep: true
      framework_quantization:
        sglang:
          allowed_modes: [fp8_block]
        trtllm:
          allowed_modes: [fp8_block]
        vllm:
          allowed_modes: [fp8_block]
    - model_path: nvidia/MiniMax-M2.5-NVFP4
      model_aliases:
        - nvidia/MiniMax-M2.7-NVFP4
      hidden_size: 3072
      inter_size: 1536
      topk: 8
      num_experts: 256
      sglang_moe_scoring_func: sigmoid
      sglang_moe_renormalize: true
      sglang_moe_has_correction_bias: true
      wideep: true
      framework_quantization:
        sglang:
          allowed_modes: [nvfp4]
        trtllm:
          allowed_modes: [nvfp4]
        vllm:
          allowed_modes: [nvfp4]

all_frameworks_op_cases:
  moe:
    cases: all

framework_specific_op_cases:
  trtllm:
    trtllm_moe_wideep:
      cases: all
