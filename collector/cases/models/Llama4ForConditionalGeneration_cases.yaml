schema_version: 1
architecture: Llama4ForConditionalGeneration
model_path: meta-llama/Llama-4-Scout-17B-16E-Instruct
model_paths:
  - meta-llama/Llama-4-Scout-17B-16E
  - meta-llama/Llama-4-Scout-17B-16E-Instruct
  - meta-llama/Llama-4-Maverick-17B-128E-Instruct
include_base: true
base_ops:
  - gemm
framework_specific_base_ops:
  # vLLM 0.24's Llama 4 attention uses fixed chunk boundaries; a generic
  # sliding-window profile is not an equivalent persisted workload.
  sglang:
    - attention_context
    - attention_generation
  trtllm:
    - attention_context
    - attention_generation
description: >
  Llama 4 hybrid model-centric collection plan. Starts with shared base op cases
  and includes the Scout/Maverick MoE shapes used by the support matrix.

model_case_values:
  attention:
    - id: llama4_attention
      model_path: meta-llama/Llama-4-Scout-17B-16E-Instruct
      model_aliases:
        - meta-llama/Llama-4-Scout-17B-16E
        - meta-llama/Llama-4-Maverick-17B-128E-Instruct
      num_attention_heads: 40
      num_key_value_heads: 8
      head_dim: 128
      # The SDK lookup retains 8192, while SGLang applies it through
      # attention_chunk_size rather than RadixAttention.sliding_window_size.
      window_sizes: [0, 8192]
      sglang_runtime_window_size: -1
      sglang_attention_chunk_size: 8192
      sglang_backends: {90: fa3, 100: trtllm_mha, 103: trtllm_mha, 120: triton}
      tensor_parallel_sizes: [1, 2, 4, 8]
  moe:
    - model_path: meta-llama/Llama-4-Scout-17B-16E-Instruct
      hidden_size: 5120
      inter_size: 8192
      topk: 1
      num_experts: 16
      sglang_moe_scoring_func: sigmoid
      sglang_moe_routing_method_type: Llama4
      sglang_moe_renormalize: false
      sglang_moe_apply_router_weight_on_input: true
      sglang_moe_backends:
        fp8_block: {100: flashinfer_trtllm, 103: flashinfer_trtllm}
    - model_path: meta-llama/Llama-4-Maverick-17B-128E-Instruct
      hidden_size: 5120
      inter_size: 8192
      topk: 1
      num_experts: 128
      sglang_moe_scoring_func: sigmoid
      sglang_moe_routing_method_type: Llama4
      sglang_moe_renormalize: false
      sglang_moe_apply_router_weight_on_input: true
      sglang_moe_backends:
        fp8_block: {100: flashinfer_trtllm, 103: flashinfer_trtllm}

all_frameworks_op_cases:
  moe:
    cases: all

framework_specific_model_case_values:
  vllm_xpu:
    moe:
      - model_path: meta-llama/Llama-4-Scout-17B-16E
        hidden_size: 8192
        inter_size: 5120
        topk: 1
        num_experts: 16
        sweep: small
        activation: silu

framework_specific_op_cases:
  vllm_xpu:
    moe:
      cases: all
