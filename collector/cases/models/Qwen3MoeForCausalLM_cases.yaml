schema_version: 1
architecture: Qwen3MoeForCausalLM
model_path: Qwen/Qwen3-235B-A22B
model_paths:
  - Qwen/Qwen3-30B-A3B
  - Qwen/Qwen3-30B-A3B-FP8
  - Qwen/Qwen3-235B-A22B
  - Qwen/Qwen3-235B-A22B-FP8
  - Qwen/Qwen3-235B-A22B-Instruct-2507
  - Qwen/Qwen3-Coder-480B-A35B-Instruct
  - nvidia/Qwen3-235B-A22B-NVFP4
include_base: true
description: >
  Qwen3 MoE model-centric collection plan.

model_case_values:
  attention:
    - id: qwen3_moe_30b_attention
      model_path: Qwen/Qwen3-30B-A3B
      model_aliases:
        - Qwen/Qwen3-30B-A3B-FP8
      num_attention_heads: 32
      num_key_value_heads: 4
      head_dim: 128
      window_size: 0
      tensor_parallel_sizes: [1, 2, 4, 8]
    - id: qwen3_moe_235b_attention
      model_path: Qwen/Qwen3-235B-A22B
      model_aliases:
        - Qwen/Qwen3-235B-A22B-FP8
        - Qwen/Qwen3-235B-A22B-Instruct-2507
        - nvidia/Qwen3-235B-A22B-NVFP4
      num_attention_heads: 64
      num_key_value_heads: 4
      head_dim: 128
      window_size: 0
      tensor_parallel_sizes: [1, 2, 4, 8, 16, 32, 64]
    - id: qwen3_coder_attention
      model_path: Qwen/Qwen3-Coder-480B-A35B-Instruct
      num_attention_heads: 96
      num_key_value_heads: 8
      head_dim: 128
      window_size: 0
      tensor_parallel_sizes: [1, 2, 4, 8, 16, 32]
  moe:
    - model_path: Qwen/Qwen3-30B-A3B
      model_aliases:
        - Qwen/Qwen3-30B-A3B-FP8
      hidden_size: 2048
      inter_size: 768
      topk: 8
      num_experts: 128
      max_tp_exclusive: 8
      sglang_moe_routing_method_type: Renormalize
      sglang_moe_backends:
        bfloat16: {100: flashinfer_trtllm, 103: flashinfer_trtllm}
        fp8_block: {100: flashinfer_trtllm, 103: flashinfer_trtllm}
      framework_cases:
        vllm_xpu:
          sweep: small
          activation: silu
    - model_path: Qwen/Qwen3-235B-A22B
      model_aliases:
        - Qwen/Qwen3-235B-A22B-FP8
        - Qwen/Qwen3-235B-A22B-Instruct-2507
        - nvidia/Qwen3-235B-A22B-NVFP4
        - Qwen/Qwen3-VL-235B-A22B-Instruct
      hidden_size: 4096
      inter_size: 1536
      topk: 8
      num_experts: 128
      sglang_moe_routing_method_type: Renormalize
      sglang_moe_backends:
        bfloat16: {100: flashinfer_trtllm, 103: flashinfer_trtllm}
        fp8_block: {100: flashinfer_trtllm, 103: flashinfer_trtllm}
    - model_path: Qwen/Qwen3-Coder-480B-A35B-Instruct
      hidden_size: 6144
      inter_size: 2560
      topk: 8
      num_experts: 160
      sglang_moe_routing_method_type: Renormalize
      sglang_moe_backends:
        bfloat16: {100: flashinfer_trtllm, 103: flashinfer_trtllm}
        fp8_block: {100: flashinfer_trtllm, 103: flashinfer_trtllm}

