schema_version: 1
architecture: Qwen3_5MoeForConditionalGeneration
model_path: Qwen/Qwen3.5-397B-A17B
model_paths:
  - Qwen/Qwen3.5-35B-A3B
  - Qwen/Qwen3.5-122B-A10B
  - Qwen/Qwen3.5-397B-A17B
include_base: true
base_ops:
  - attention_context
  - attention_generation
  - gemm
description: >
  Qwen3.5 MoE/GDN model-centric collection plan.

model_case_values:
  attention:
    - id: qwen35_35b_attention
      model_path: Qwen/Qwen3.5-35B-A3B
      num_attention_heads: 16
      num_key_value_heads: 2
      head_dim: 256
      window_size: 0
      sglang_backends: {90: fa3, 100: triton, 103: triton, 120: flashinfer}
      tensor_parallel_sizes: [1, 2, 4, 8, 16]
    - id: qwen35_122b_attention
      model_path: Qwen/Qwen3.5-122B-A10B
      num_attention_heads: 32
      num_key_value_heads: 2
      head_dim: 256
      window_size: 0
      sglang_backends: {90: fa3, 100: triton, 103: triton, 120: flashinfer}
      tensor_parallel_sizes: [1, 2, 4, 8, 16, 32]
    - id: qwen35_397b_attention
      model_path: Qwen/Qwen3.5-397B-A17B
      num_attention_heads: 32
      num_key_value_heads: 2
      head_dim: 256
      window_size: 0
      sglang_backends: {90: fa3, 100: triton, 103: triton, 120: flashinfer}
      tensor_parallel_sizes: [1, 2, 4, 8, 16, 32]
  moe:
    - model_path: Qwen/Qwen3.5-35B-A3B
      hidden_size: 2048
      inter_size: 512
      topk: 8
      num_experts: 256
      sglang_moe_routing_method_type: RenormalizeNaive
      sglang_moe_backends:
        bfloat16: {100: flashinfer_trtllm, 103: flashinfer_trtllm}
        fp8_block: {100: flashinfer_trtllm, 103: flashinfer_trtllm}
    - model_path: Qwen/Qwen3.5-122B-A10B
      hidden_size: 3072
      inter_size: 1024
      topk: 8
      num_experts: 256
      sglang_moe_routing_method_type: RenormalizeNaive
      sglang_moe_backends:
        bfloat16: {100: flashinfer_trtllm, 103: flashinfer_trtllm}
        fp8_block: {100: flashinfer_trtllm, 103: flashinfer_trtllm}
    - model_path: Qwen/Qwen3.5-397B-A17B
      hidden_size: 4096
      inter_size: 1024
      topk: 10
      num_experts: 512
      sglang_moe_routing_method_type: RenormalizeNaive
      sglang_moe_backends:
        bfloat16: {100: flashinfer_trtllm, 103: flashinfer_trtllm}
        fp8_block: {100: flashinfer_trtllm, 103: flashinfer_trtllm}
  gdn:
    - model_path: Qwen/Qwen3.5-35B-A3B
      d_model: 2048
      d_conv: 4
      num_k_heads: 16
      head_k_dim: 128
      num_v_heads: 32
      head_v_dim: 128
    - model_path: Qwen/Qwen3.5-122B-A10B
      d_model: 3072
      d_conv: 4
      num_k_heads: 16
      head_k_dim: 128
      num_v_heads: 64
      head_v_dim: 128
    - model_path: Qwen/Qwen3.5-397B-A17B
      d_model: 4096
      d_conv: 4
      num_k_heads: 16
      head_k_dim: 128
      num_v_heads: 64
      head_v_dim: 128

all_frameworks_op_cases:
  moe:
    cases: all
  gdn:
    cases: all
