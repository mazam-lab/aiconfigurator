schema_version: 1
architecture: Gemma4ForConditionalGeneration
model_path: google/gemma-4-26B-A4B
model_paths:
  - google/gemma-4-26B-A4B
include_base: true
base_ops:
  - gemm
framework_specific_base_ops:
  # vLLM 0.24's Gemma 4 path requires multimodal-prefix semantics that the
  # persisted generic attention schema cannot express.
  sglang:
    - attention_context
    - attention_generation
  trtllm:
    - attention_context
    - attention_generation
description: >
  Gemma 4 hybrid SWA/global attention plus routed-MoE collection plan.

model_case_values:
  attention:
    - id: gemma4_swa_attention
      model_path: google/gemma-4-26B-A4B
      num_attention_heads: 16
      num_key_value_heads: 8
      head_dim: 256
      window_size: 1024
      sglang_runtime_window_size: 1023
      sglang_scaling: 1.0
      sglang_backends: {90: triton, 100: trtllm_mha, 103: trtllm_mha, 120: triton}
      tensor_parallel_sizes: [1, 2, 4, 8, 16]
    - id: gemma4_global_attention
      model_path: google/gemma-4-26B-A4B
      num_attention_heads: 16
      num_key_value_heads: 2
      head_dim: 512
      window_size: 0
      sglang_scaling: 1.0
      sglang_backends: {90: triton, 100: trtllm_mha, 103: trtllm_mha, 120: triton}
      tensor_parallel_sizes: [1, 2, 4, 8, 16]
  moe:
    - model_path: google/gemma-4-26B-A4B
      hidden_size: 2816
      inter_size: 704
      topk: 8
      num_experts: 128
      sglang_moe_activation: gelu

all_frameworks_op_cases:
  moe:
    cases: all
